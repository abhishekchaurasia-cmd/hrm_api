services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
      - "9229:9229"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: hrm_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-only-secret-change-in-production-min32
      JWT_REFRESH_SECRET: dev-only-refresh-secret-change-in-prod32
      CORS_ORIGIN: "http://localhost:3000"
      SWAGGER_ENABLED: "true"
      LOG_LEVEL: debug
    volumes:
      - ./src:/app/src
      - ./node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hrm-dev

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hrm_db
    ports:
      - "5432:5432"
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hrm_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrm-dev

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrm-dev

volumes:
  dev_postgres_data:

networks:
  hrm-dev:
    driver: bridge
